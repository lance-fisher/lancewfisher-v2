<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    .bg   { fill: #0a0a0b; }
    .mark { fill: #c9a84c; }
    @media (prefers-color-scheme: light) {
      .bg   { fill: #f5f0e8; }
      .mark { fill: #8a6f28; }
    }
  </style>
  <!-- Background with subtle radius -->
  <rect class="bg" width="32" height="32" rx="5"/>
  <!-- "F" lettermark — geometric serif style in brand gold -->
  <!-- Vertical stem -->
  <rect class="mark" x="9" y="8" width="3" height="17"/>
  <!-- Top horizontal bar (full) -->
  <rect class="mark" x="9" y="8" width="14" height="3"/>
  <!-- Mid horizontal bar (shorter) -->
  <rect class="mark" x="9" y="14.5" width="10" height="2.5"/>
</svg>
