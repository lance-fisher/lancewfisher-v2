  <text x="64" y="84" fill="#262019" font-family="Georgia, serif" font-size="34">Bloodlines House Stonehelm Military Silhouettes</text>
  <text x="64" y="116" fill="#68574a" font-family="Arial, sans-serif" font-size="18">Stage: first_pass_concept | Review: placeholder_only | Scope: defensive house silhouette treatment, not a gameplay rewrite</text>

  <g transform="translate(1160 58)">
    <rect width="344" height="110" rx="16" fill="#ece2d5" stroke="#8f7963" stroke-width="2"/>
    <text x="18" y="28" fill="#3e342d" font-family="Arial, sans-serif" font-size="16">Palette / Material Read</text>
    <rect x="18" y="42" width="26" height="26" rx="6" fill="#6a543d"/>
