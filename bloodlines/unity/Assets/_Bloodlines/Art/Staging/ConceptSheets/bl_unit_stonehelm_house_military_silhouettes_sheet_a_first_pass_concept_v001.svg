    <text x="18" y="92" fill="#615042" font-family="Arial, sans-serif" font-size="13">Warm stone, dense timber, hide, wool, iron braces. Broad shields and low-center silhouettes.</text>
  </g>

  <g stroke="#b6a28f" stroke-width="2">
