    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">Twin storehouses imply throughput and route load, not simply a larger warehouse.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">The twin mass should stay legible as paired cargo buildings at gameplay height.</text>
    <rect x="18" y="266" width="22" height="22" fill="#d9ccb1"/>
    <rect x="46" y="266" width="22" height="22" fill="#86633c"/>
    <rect x="74" y="266" width="22" height="22" fill="#8f7758"/>
  </g>

  <g transform="translate(1116 204)">
