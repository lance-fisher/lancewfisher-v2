    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">Route warehouses need clear loading logic and wagon access across the roofline silhouette.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">The wheel read helps throughput, but cargo remains the core message.</text>
