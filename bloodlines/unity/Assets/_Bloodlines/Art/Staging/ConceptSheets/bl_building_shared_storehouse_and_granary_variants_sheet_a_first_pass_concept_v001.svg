    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">Elevated granaries should read as protected food mass with lifted floors and vent rhythm.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">Avoid barn casualness. This is food security, not scenery.</text>
    <rect x="18" y="266" width="22" height="22" fill="#d7c48e"/>
    <rect x="46" y="266" width="22" height="22" fill="#8a673f"/>
    <rect x="74" y="266" width="22" height="22" fill="#6f5d49"/>
  </g>

