  <text x="64" y="996" fill="#6a5845" font-family="Arial, sans-serif" font-size="15">Use for deeper storage-family prompting. Granary and storehouse variants must preserve food or cargo meaning even when upgrade state, House trim, or defensive reinforcement is added later.</text>
