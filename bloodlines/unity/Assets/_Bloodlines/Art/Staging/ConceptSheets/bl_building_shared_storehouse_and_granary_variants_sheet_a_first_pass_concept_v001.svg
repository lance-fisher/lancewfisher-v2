    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">Frontier pantry reads should stay smaller and more vulnerable than mainline granaries.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">This is support stock, not a central food palace.</text>
    <rect x="18" y="266" width="22" height="22" fill="#d7c48e"/>
    <rect x="46" y="266" width="22" height="22" fill="#775431"/>
    <rect x="74" y="266" width="22" height="22" fill="#93775e"/>
  </g>

