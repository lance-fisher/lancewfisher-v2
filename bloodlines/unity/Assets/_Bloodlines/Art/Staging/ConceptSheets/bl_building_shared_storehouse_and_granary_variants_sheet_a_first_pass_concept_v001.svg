    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">Levy stockyards should show rough supply mass and animal-feed utility, not luxury care.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">Keep them temporary and practical so they do not read as stables.</text>
