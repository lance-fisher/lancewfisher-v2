    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">Fortified depots need stronger corners and doors, but should still read as logistics before defense.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">Do not let them collapse into barracks or towers.</text>
    <rect x="18" y="266" width="22" height="22" fill="#6e5847"/>
    <rect x="46" y="266" width="22" height="22" fill="#73522f"/>
    <rect x="74" y="266" width="22" height="22" fill="#9f876a"/>
  </g>

