  <text x="64" y="84" fill="#2c241d" font-family="Georgia, serif" font-size="34">Bloodlines Market, Storehouse, And Granary Sheet</text>
  <text x="64" y="116" fill="#6c5a48" font-family="Arial, sans-serif" font-size="18">Stage: first_pass_concept | Review: placeholder_only | Focus: food and cargo support structures with clear RTS economy reads</text>

  <g font-family="Arial, sans-serif" font-size="16" fill="#47392c">
    <text x="92" y="170">Granary</text>
    <text x="612" y="170">Storehouse</text>
    <text x="1128" y="170">Market Hall</text>
    <text x="92" y="572">Open Market Court</text>
    <text x="612" y="572">Cargo Yard</text>
    <text x="1128" y="572">Food Depot Annex</text>
  </g>

  <g stroke="#b8a58d" stroke-width="2">
    <rect x="64" y="186" width="440" height="334" rx="18" fill="#fcf7ef"/>
