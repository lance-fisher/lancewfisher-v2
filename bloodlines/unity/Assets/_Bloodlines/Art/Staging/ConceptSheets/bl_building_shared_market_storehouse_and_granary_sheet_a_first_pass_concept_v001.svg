    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Cargo yards should show wagon handling and stacked goods before interior detail.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Keep the yard usable and route-facing, not maze-like.</text>
    <rect x="18" y="266" width="22" height="22" fill="#a89173"/>
    <rect x="46" y="266" width="22" height="22" fill="#8f7758"/>
    <rect x="74" y="266" width="22" height="22" fill="#6d5948"/>
  </g>

