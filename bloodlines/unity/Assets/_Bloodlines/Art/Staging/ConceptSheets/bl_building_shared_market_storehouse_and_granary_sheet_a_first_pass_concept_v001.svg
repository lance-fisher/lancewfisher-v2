    <rect x="46" y="266" width="22" height="22" fill="#86623d"/>
    <rect x="74" y="266" width="22" height="22" fill="#d2c08c"/>
  </g>

  <text x="64" y="996" fill="#6a5845" font-family="Arial, sans-serif" font-size="15">Use for economy-support prompting and support-building lookdev. These sheets should keep food, cargo, and market purpose legible from roofline and frontage alone before House overlays or damage states are added.</text>
