    <rect x="34" y="120" width="330" height="20" fill="#8f7758"/>
    <rect x="60" y="92" width="70" height="48" fill="#a89173" stroke="#6a5a47" stroke-width="4"/>
    <rect x="146" y="84" width="58" height="56" fill="#967d63" stroke="#605141" stroke-width="4"/>
    <rect x="222" y="88" width="62" height="52" fill="#b59c7c" stroke="#6f5d49" stroke-width="4"/>
    <circle cx="318" cy="142" r="18" fill="#6d5948"/>
    <circle cx="352" cy="144" r="14" fill="#6d5948"/>
