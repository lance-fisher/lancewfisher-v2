    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Food depots should bridge granary security and storehouse throughput.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Read as support infrastructure, not as a command structure or luxury warehouse.</text>
