    <text x="182" y="108" fill="#645243" font-size="13">not fragile court pageantry.</text>
  </g>

  <g transform="translate(1220 252)">
    <rect width="272" height="176" rx="14" fill="#e8dcc8"/>
    <circle cx="56" cy="38" r="17" fill="#2a221b"/>
    <rect x="44" y="54" width="28" height="70" rx="10" fill="#ad7f17"/>
    <rect x="47" y="122" width="8" height="30" rx="4" fill="#2a231d"/>
    <rect x="59" y="122" width="8" height="30" rx="4" fill="#2a231d"/>
    <rect x="106" y="42" width="8" height="100" rx="4" fill="#6b5435"/>
    <polygon points="114,42 154,54 114,68" fill="#d9c58a"/>
    <text x="182" y="60" fill="#352d28" font-size="15">Command authority comes from</text>
    <text x="182" y="84" fill="#645243" font-size="13">wealth-backed organization, not</text>
    <text x="182" y="108" fill="#645243" font-size="13">ornate noble inheritance.</text>
  </g>

  <g transform="translate(88 574)" font-family="Arial, sans-serif">
    <text x="0" y="24" fill="#322922" font-size="22">House Read Rules</text>
    <text x="0" y="62" fill="#5e4d40" font-size="16">1. Goldgrave should read as money-backed professionalism: clean kit, practical polish, and maintained surfaces instead of aristocratic flourish.</text>
    <text x="0" y="92" fill="#5e4d40" font-size="16">2. Gold accents signal capital and maintenance quality, not treasure-hoard spectacle or ceremonial overload.</text>
    <text x="0" y="122" fill="#5e4d40" font-size="16">3. Crossbow and guard lanes should feel disciplined and urban, tied to trade security rather than feudal mystique.</text>

    <text x="0" y="178" fill="#322922" font-size="22">What To Avoid</text>
    <text x="0" y="216" fill="#5e4d40" font-size="16">- Do not turn Goldgrave into bright parade gold, jewel armor, or lavish fantasy merchant princes.</text>
    <text x="0" y="246" fill="#5e4d40" font-size="16">- Do not confuse this lane with Highborne nobility, Whitehall bureaucracy, or Trueborn state authority.</text>
    <text x="0" y="276" fill="#5e4d40" font-size="16">- Do not let the visual language drift into mercenary chaos; it should feel ordered and funded.</text>

    <text x="0" y="332" fill="#322922" font-size="22">Use In Review</text>
    <text x="0" y="370" fill="#5e4d40" font-size="16">This sheet is a silhouette and material-direction board for future prompting, 3D blockout, icon treatment, and approved staging review.</text>
    <text x="0" y="400" fill="#5e4d40" font-size="16">It does not declare new canon units beyond the settled Goldgrave visual treatment lane.</text>
  </g>

  <text x="64" y="992" fill="#6a5848" font-family="Arial, sans-serif" font-size="15">House-specific silhouette board for governed graphics-lane review. Keep additive to canon and stage only through approved Unity staging surfaces.</text>
</svg>
