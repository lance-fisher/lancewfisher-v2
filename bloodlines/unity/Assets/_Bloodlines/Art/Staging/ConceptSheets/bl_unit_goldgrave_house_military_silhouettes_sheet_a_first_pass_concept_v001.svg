    <path d="M108 74 L148 62 L170 76 L170 124 L146 138 L108 124 Z" fill="#d2c4aa" stroke="#887145" stroke-width="4"/>
    <text x="188" y="60" fill="#352d28" font-size="15">Paid discipline and clean</text>
    <text x="188" y="84" fill="#645243" font-size="13">maintenance should read before</text>
    <text x="188" y="108" fill="#645243" font-size="13">wealth display or family pomp.</text>
  </g>

  <g transform="translate(472 252)">
    <rect width="272" height="176" rx="14" fill="#e8dcc8"/>
    <circle cx="54" cy="38" r="17" fill="#2a221b"/>
