    <rect x="230" y="130" width="20" height="20" fill="#7f8f9e"/>
  </g>

  <g transform="translate(88 574)" font-family="Arial, sans-serif">
    <text x="0" y="24" fill="#38444f" font-size="22">House Read Rules</text>
    <text x="0" y="62" fill="#5f6d79" font-size="16">1. Trueborn should read as administrative legitimacy and established order: pale stone, silver-blue discipline, restrained gold, and clear office hierarchy.</text>
    <text x="0" y="92" fill="#5f6d79" font-size="16">2. The contrast value is composure. Silhouettes remain practical and battlefield-readable, but cleaner and more balanced than the frontier or industrial houses.</text>
    <text x="0" y="122" fill="#5f6d79" font-size="16">3. Command treatment gains seal and sash logic rather than larger weapons or aggressive ornament.</text>

    <text x="0" y="178" fill="#38444f" font-size="22">What To Avoid</text>
    <text x="0" y="216" fill="#5f6d79" font-size="16">- Do not drift into Highborne luxury, Whitehall bureaucracy, or paladin-fantasy silver spectacle.</text>
    <text x="0" y="246" fill="#5f6d79" font-size="16">- Do not use saturated blue or bright gold as loud faction colors; restraint is part of the read.</text>
    <text x="0" y="276" fill="#5f6d79" font-size="16">- Do not let cloth flourish overpower the practical soldier read at RTS camera height.</text>

    <text x="0" y="332" fill="#38444f" font-size="22">Use In Review</text>
    <text x="0" y="370" fill="#5f6d79" font-size="16">This sheet provides a settled-visual-only contrast house for comparison against Ironmark, Stonehelm, and Hartvale treatment boards.</text>
    <text x="0" y="400" fill="#5f6d79" font-size="16">It remains additive and does not settle a new gameplay roster or new Trueborn strategic lane.</text>
  </g>

  <text x="64" y="992" fill="#64727d" font-family="Arial, sans-serif" font-size="15">House-specific silhouette board for governed graphics-lane review. Preserve Trueborn's calm administrative authority and silver-blue battlefield composure.</text>
</svg>
