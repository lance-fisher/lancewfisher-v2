    <text x="178" y="58" fill="#37434d" font-size="15">Marshal read is measured</text>
    <text x="178" y="82" fill="#60707d" font-size="13">authority and seal-bearing</text>
    <text x="178" y="106" fill="#60707d" font-size="13">command, not spectacle.</text>
    <rect x="178" y="130" width="20" height="20" fill="#b7c4d1"/>
