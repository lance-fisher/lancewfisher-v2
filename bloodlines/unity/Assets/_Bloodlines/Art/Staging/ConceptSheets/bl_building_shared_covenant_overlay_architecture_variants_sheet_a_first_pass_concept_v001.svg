    <circle cx="202" cy="68" r="10" fill="#6f8453"/>
    <path d="M0 162 L68 156 L150 164 L238 158 L322 166 L400 160 L400 190 L0 190 Z" fill="#8f7757"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">The Wild overlay integrates growth, grove marking, and natural structure into the base form.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">It must look living and territorial, not whimsical or uncontrolled.</text>
    <rect x="18" y="266" width="22" height="22" fill="#6f8453"/>
    <rect x="46" y="266" width="22" height="22" fill="#58703c"/>
    <rect x="74" y="266" width="22" height="22" fill="#b39a7b"/>
  </g>

