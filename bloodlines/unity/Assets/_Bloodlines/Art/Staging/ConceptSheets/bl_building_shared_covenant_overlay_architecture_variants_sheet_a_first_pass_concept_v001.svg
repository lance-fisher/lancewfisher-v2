    <line x1="228" y1="48" x2="228" y2="120" stroke="#47443b" stroke-width="6"/>
    <line x1="306" y1="48" x2="306" y2="120" stroke="#6f8453" stroke-width="6"/>
    <rect x="60" y="34" width="24" height="18" fill="#ece0b1"/>
