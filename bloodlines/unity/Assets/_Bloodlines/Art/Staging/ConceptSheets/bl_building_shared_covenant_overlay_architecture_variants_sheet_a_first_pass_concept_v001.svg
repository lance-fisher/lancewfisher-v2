  <text x="64" y="84" fill="#2c241d" font-family="Georgia, serif" font-size="34">Bloodlines Covenant Overlay Architecture Variants Sheet</text>
  <text x="64" y="116" fill="#6c5a48" font-family="Arial, sans-serif" font-size="18">Stage: first_pass_concept | Review: placeholder_only | Focus: the four canonical covenant overlays modifying House architecture without erasing dynasty identity</text>

  <g font-family="Arial, sans-serif" font-size="16" fill="#47392c">
    <text x="92" y="170">Old Light Overlay</text>
    <text x="612" y="170">Blood Dominion Overlay</text>
    <text x="1128" y="170">The Order Overlay</text>
    <text x="92" y="572">The Wild Overlay</text>
    <text x="612" y="572">Festival Procession Lane</text>
    <text x="1128" y="572">Interrupted Rite Read</text>
  </g>

  <g stroke="#b8a58d" stroke-width="2">
    <rect x="64" y="186" width="440" height="334" rx="18" fill="#fcf7ef"/>
    <rect x="580" y="186" width="440" height="334" rx="18" fill="#fcf7ef"/>
    <rect x="1096" y="186" width="440" height="334" rx="18" fill="#fcf7ef"/>
    <rect x="64" y="588" width="440" height="334" rx="18" fill="#fcf7ef"/>
    <rect x="580" y="588" width="440" height="334" rx="18" fill="#fcf7ef"/>
    <rect x="1096" y="588" width="440" height="334" rx="18" fill="#fcf7ef"/>
