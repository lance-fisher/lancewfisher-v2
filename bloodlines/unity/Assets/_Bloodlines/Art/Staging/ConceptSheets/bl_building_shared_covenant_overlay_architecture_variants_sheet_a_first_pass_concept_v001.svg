    <line x1="202" y1="34" x2="202" y2="146" stroke="#ece0b1" stroke-width="8"/>
    <rect x="194" y="24" width="16" height="18" fill="#ece0b1"/>
    <path d="M0 162 L72 154 L156 164 L240 158 L326 166 L400 160 L400 190 L0 190 Z" fill="#8f7757"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">Old Light overlays should use illumination, witness markers, and clean processional emphasis.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">The House silhouette stays intact. The covenant modifies light and clarity, not massing alone.</text>
    <rect x="18" y="266" width="22" height="22" fill="#ece0b1"/>
    <rect x="46" y="266" width="22" height="22" fill="#cfc6b7"/>
    <rect x="74" y="266" width="22" height="22" fill="#92724a"/>
  </g>

  <g transform="translate(600 204)">
    <rect width="400" height="190" rx="14" fill="#ddd2c0"/>
    <rect x="58" y="92" width="284" height="54" fill="#8d765a" stroke="#5c4f40" stroke-width="4"/>
    <polygon points="44,92 124,42 204,92" fill="#6d2d23" stroke="#3f1712" stroke-width="4"/>
    <polygon points="194,92 276,42 354,92" fill="#53211a" stroke="#31100b" stroke-width="4"/>
    <rect x="182" y="110" width="36" height="36" fill="#d0b278" stroke="#7f6c46" stroke-width="3"/>
    <line x1="200" y1="42" x2="200" y2="24" stroke="#3f1712" stroke-width="6"/>
    <path d="M0 162 L70 156 L154 164 L238 158 L324 166 L400 160 L400 190 L0 190 Z" fill="#8f7757"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">Blood Dominion overlays should feel consequential, enclosed, and ritual-weighted.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">Use altar geometry and wound-red accents carefully so the House base is still readable.</text>
    <rect x="18" y="266" width="22" height="22" fill="#6d2d23"/>
    <rect x="46" y="266" width="22" height="22" fill="#d0b278"/>
    <rect x="74" y="266" width="22" height="22" fill="#8d765a"/>
  </g>

  <g transform="translate(1116 204)">
    <rect width="400" height="190" rx="14" fill="#ddd2c0"/>
    <rect x="60" y="90" width="280" height="56" fill="#c7c1b5" stroke="#7a674f" stroke-width="4"/>
    <polygon points="48,90 118,44 188,90" fill="#7d6845" stroke="#5b4528" stroke-width="4"/>
    <polygon points="186,90 262,44 352,90" fill="#6f5b3e" stroke="#503c23" stroke-width="4"/>
    <line x1="122" y1="54" x2="122" y2="146" stroke="#47443b" stroke-width="4"/>
