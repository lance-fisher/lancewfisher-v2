  <text x="64" y="996" fill="#6a5845" font-family="Arial, sans-serif" font-size="15">Use for faith-overlay prompting and House-plus-covenant compatibility checks. Covenant language should modify structure, procession, and material emphasis without erasing dynasty ownership or function.</text>
