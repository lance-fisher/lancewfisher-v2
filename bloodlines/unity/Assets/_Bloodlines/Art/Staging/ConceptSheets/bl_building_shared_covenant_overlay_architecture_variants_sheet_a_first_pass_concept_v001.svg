    <line x1="282" y1="54" x2="282" y2="146" stroke="#47443b" stroke-width="4"/>
    <path d="M0 162 L72 156 L156 164 L238 158 L322 166 L400 160 L400 190 L0 190 Z" fill="#8f7757"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">The Order overlay organizes space through threshold, sequence, and explicit structure.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">The read should be lawful and ranked, not ornamental for ornament's sake.</text>
    <rect x="18" y="266" width="22" height="22" fill="#47443b"/>
    <rect x="46" y="266" width="22" height="22" fill="#c7c1b5"/>
    <rect x="74" y="266" width="22" height="22" fill="#7d6845"/>
  </g>

  <g transform="translate(84 606)">
    <rect width="400" height="190" rx="14" fill="#ddd2c0"/>
    <rect x="54" y="94" width="282" height="52" fill="#b39a7b" stroke="#6f5d49" stroke-width="4"/>
    <polygon points="42,94 116,48 190,94" fill="#6b5a31" stroke="#4c3d1f" stroke-width="4"/>
    <polygon points="184,94 258,48 348,94" fill="#58703c" stroke="#3b4d25" stroke-width="4"/>
    <line x1="102" y1="52" x2="78" y2="144" stroke="#6f8453" stroke-width="8"/>
