    <path d="M0 162 L68 156 L154 164 L240 158 L326 166 L400 160 L400 190 L0 190 Z" fill="#8f7757"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">Interrupted or desecrated rite reads should show stress and failure without turning into fantasy corruption.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">Broken processional order and damaged ritual fixtures are enough.</text>
