    <rect x="216" y="34" width="24" height="18" fill="#47443b"/>
    <rect x="294" y="34" width="24" height="18" fill="#6f8453"/>
    <path d="M0 162 L66 156 L150 164 L236 158 L324 166 L400 160 L400 190 L0 190 Z" fill="#8f7757"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">Festival and procession lanes should clarify covenant presence without replacing base building identity.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">Use temporary lines, banners, basins, or posts, not permanent spectacle on every structure.</text>
    <rect x="18" y="266" width="22" height="22" fill="#ece0b1"/>
    <rect x="46" y="266" width="22" height="22" fill="#6d2d23"/>
    <rect x="74" y="266" width="22" height="22" fill="#6f8453"/>
  </g>

