    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Stone civic bridges need a clear arch read and orderly approach logic.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">They should feel permanent without becoming ornate skyline pieces.</text>
    <rect x="18" y="266" width="22" height="22" fill="#6488a1"/>
    <rect x="46" y="266" width="22" height="22" fill="#8c7b67"/>
    <rect x="74" y="266" width="22" height="22" fill="#d7cec0"/>
  </g>

