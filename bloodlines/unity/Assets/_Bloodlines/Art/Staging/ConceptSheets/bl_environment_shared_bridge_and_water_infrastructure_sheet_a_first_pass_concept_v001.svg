    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">The frontier bridge is direct, functional, and easy to read as a crossing lane.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Keep support posts and deck width broad enough for minimap-scale comprehension.</text>
    <rect x="18" y="266" width="22" height="22" fill="#6488a1"/>
    <rect x="46" y="266" width="22" height="22" fill="#7f6240"/>
