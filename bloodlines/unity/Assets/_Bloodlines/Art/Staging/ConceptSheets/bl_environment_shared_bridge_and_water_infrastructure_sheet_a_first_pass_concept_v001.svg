    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Fortified bridges are crossing points first and choke bastions second.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">The player must instantly understand both passage and defensive control.</text>
    <rect x="18" y="266" width="22" height="22" fill="#6488a1"/>
    <rect x="46" y="266" width="22" height="22" fill="#81715d"/>
    <rect x="74" y="266" width="22" height="22" fill="#4b3e33"/>
  </g>

