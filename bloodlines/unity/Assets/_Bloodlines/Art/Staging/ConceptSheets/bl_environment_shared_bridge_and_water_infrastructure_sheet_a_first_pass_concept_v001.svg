    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Broken rhythm should read in one glance, not as visual noise.</text>
    <rect x="18" y="266" width="22" height="22" fill="#6488a1"/>
    <rect x="46" y="266" width="22" height="22" fill="#7f6240"/>
    <rect x="74" y="266" width="22" height="22" fill="#8c7b67"/>
