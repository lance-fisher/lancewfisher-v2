  <text x="64" y="996" fill="#6a5845" font-family="Arial, sans-serif" font-size="15">Use with: map-and-terrain rules, environment manifest, and bridge framework for crossing clarity, choke visibility, and water-infrastructure identity. These remain concept placeholders for later blockout, prop kits, and biome integration.</text>
