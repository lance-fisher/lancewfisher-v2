    <text x="18" y="192" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Field belts should dissolve into roads by wheel wear, not hard tile seams.</text>
    <text x="18" y="214" fill="#695544" font-family="Arial, sans-serif" font-size="12">The farm still reads as managed land even where traffic cuts through it.</text>
    <rect x="18" y="232" width="18" height="18" fill="#d8cb79"/>
    <rect x="42" y="232" width="18" height="18" fill="#b6a14f"/>
    <rect x="66" y="232" width="18" height="18" fill="#8f6e47"/>
  </g>

