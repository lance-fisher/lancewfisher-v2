    <path d="M0 118 L48 110 L94 120 L138 102 L182 118 L228 108 L288 122 L288 162 L0 162 Z" fill="#5f5146"/>
    <path d="M20 94 L56 104 L92 94 L132 112 L172 100 L212 116 L248 104" fill="none" stroke="#b6441f" stroke-width="10" stroke-linecap="round"/>
