    <polygon points="0,114 36,98 72,114 104,92 132,116 168,86 210,112 246,96 288,112 288,162 0,162" fill="#8f8678"/>
    <path d="M32 128 L70 116 L112 126 L150 112 L190 126 L232 116" fill="none" stroke="#d6cdc0" stroke-width="12" stroke-linecap="round"/>
    <circle cx="88" cy="102" r="8" fill="#cfc6b8"/>
