  <text x="64" y="116" fill="#6e5a46" font-family="Arial, sans-serif" font-size="18">Stage: first_pass_concept | Review: placeholder_only | Focus: economy-site wear, route attachment, and biome-edge transitions</text>

  <g font-family="Arial, sans-serif" font-size="15" fill="#47392c">
    <text x="88" y="168">Lumber Ground Treatment</text>
    <text x="468" y="168">Quarry Ground Treatment</text>
    <text x="848" y="168">Iron Site Ground Treatment</text>
    <text x="1228" y="168">Well And Water Structure Ground</text>
    <text x="88" y="562">Farm To Path Blend</text>
    <text x="468" y="562">Path To Mud Siege Wear</text>
    <text x="848" y="562">Grass To Stone Slope Blend</text>
    <text x="1228" y="562">Plains To Forest Edge Blend</text>
  </g>

