    <rect x="186" y="98" width="34" height="20" fill="#92754f"/>
    <text x="18" y="192" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Stumps, ruts, and cut-lane logic identify the wood site before zoom.</text>
    <text x="18" y="214" fill="#695544" font-family="Arial, sans-serif" font-size="12">Wear should read as worked forest, not random debris.</text>
    <rect x="18" y="232" width="18" height="18" fill="#7f8751"/>
    <rect x="42" y="232" width="18" height="18" fill="#866f4f"/>
    <rect x="66" y="232" width="18" height="18" fill="#5c693f"/>
  </g>

