  <text x="64" y="996" fill="#6a5845" font-family="Arial, sans-serif" font-size="15">Use with: terrain and biome manifest, resource logic, and map visual rules for edge blending, route wear, and economy-site readability. These remain concept placeholders for later decal, splatmap, and material-family production.</text>
