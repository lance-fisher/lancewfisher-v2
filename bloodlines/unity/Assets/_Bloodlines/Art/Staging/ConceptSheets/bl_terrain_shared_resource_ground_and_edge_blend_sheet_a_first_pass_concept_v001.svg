    <text x="18" y="192" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Iron sites need spoil, soot, and controlled slag or ember marks.</text>
    <text x="18" y="214" fill="#695544" font-family="Arial, sans-serif" font-size="12">Do not over-brighten the site into fantasy lava language.</text>
    <rect x="18" y="232" width="18" height="18" fill="#2c3137"/>
    <rect x="42" y="232" width="18" height="18" fill="#b6441f"/>
    <rect x="66" y="232" width="18" height="18" fill="#6d5842"/>
  </g>

