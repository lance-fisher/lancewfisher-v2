    <text x="18" y="192" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Wells and water structures need damp ground, foot traffic, and calm civic wear.</text>
    <text x="18" y="214" fill="#695544" font-family="Arial, sans-serif" font-size="12">This should read as life-support infrastructure, not a combat prop.</text>
    <rect x="18" y="232" width="18" height="18" fill="#afc9cf"/>
    <rect x="42" y="232" width="18" height="18" fill="#d9d1c1"/>
    <rect x="66" y="232" width="18" height="18" fill="#8f6f48"/>
  </g>

