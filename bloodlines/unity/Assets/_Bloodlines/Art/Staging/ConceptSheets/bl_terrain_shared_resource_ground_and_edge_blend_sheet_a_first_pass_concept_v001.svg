    <circle cx="230" cy="106" r="8" fill="#cfc6b8"/>
    <text x="18" y="192" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Quarry sites need spoil dust, broken stone, and hauling-path logic.</text>
    <text x="18" y="214" fill="#695544" font-family="Arial, sans-serif" font-size="12">The ground should help identify stone extraction even when the node is busy.</text>
    <rect x="18" y="232" width="18" height="18" fill="#b5ac9c"/>
    <rect x="42" y="232" width="18" height="18" fill="#8f8678"/>
    <rect x="66" y="232" width="18" height="18" fill="#d6cdc0"/>
  </g>

