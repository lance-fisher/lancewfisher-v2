    <rect x="28" y="110" width="340" height="36" fill="#b39a7b" stroke="#6e5b48" stroke-width="4"/>
    <rect x="44" y="84" width="40" height="26" fill="#8f6a40"/>
    <rect x="94" y="76" width="54" height="34" fill="#c19445"/>
    <rect x="156" y="84" width="48" height="26" fill="#9a5c41"/>
    <rect x="216" y="74" width="56" height="36" fill="#a88f71"/>
    <rect x="284" y="84" width="50" height="26" fill="#7d6049"/>
    <line x1="192" y1="40" x2="192" y2="110" stroke="#624b31" stroke-width="6"/>
    <rect x="180" y="34" width="24" height="16" fill="#d2ad58"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Markets read through frontage, stall rhythm, and route-facing openness.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Avoid making them look like barracks or permanent halls.</text>
    <rect x="18" y="266" width="22" height="22" fill="#b39a7b"/>
    <rect x="46" y="266" width="22" height="22" fill="#c19445"/>
    <rect x="74" y="266" width="22" height="22" fill="#9a5c41"/>
  </g>

  <g transform="translate(600 204)">
    <rect width="400" height="190" rx="14" fill="#ddd2c0"/>
    <rect x="60" y="78" width="180" height="68" fill="#9f876a" stroke="#665844" stroke-width="4"/>
    <polygon points="52,78 152,34 248,78" fill="#7b5b36" stroke="#614824" stroke-width="4"/>
    <rect x="256" y="96" width="92" height="50" fill="#8d7459" stroke="#5d4f40" stroke-width="4"/>
    <rect x="86" y="94" width="20" height="18" fill="#4b3e31"/>
    <rect x="126" y="94" width="20" height="18" fill="#4b3e31"/>
    <rect x="166" y="94" width="20" height="18" fill="#4b3e31"/>
    <rect x="206" y="94" width="20" height="18" fill="#4b3e31"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Storehouses need heavy doors, cargo mass, and broad side walls.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">They should read as intake and stock, not as residence.</text>
    <rect x="18" y="266" width="22" height="22" fill="#9f876a"/>
    <rect x="46" y="266" width="22" height="22" fill="#7b5b36"/>
    <rect x="74" y="266" width="22" height="22" fill="#8d7459"/>
  </g>

  <g transform="translate(1116 204)">
    <rect width="400" height="190" rx="14" fill="#ddd2c0"/>
    <rect x="58" y="88" width="124" height="58" fill="#c1a97d" stroke="#7e684c" stroke-width="4"/>
    <polygon points="50,88 120,40 190,88" fill="#8a6b40" stroke="#644924" stroke-width="4"/>
    <rect x="210" y="72" width="132" height="74" fill="#b99f74" stroke="#766145" stroke-width="4"/>
    <polygon points="202,72 278,26 350,72" fill="#85663e" stroke="#644924" stroke-width="4"/>
    <rect x="96" y="58" width="24" height="18" fill="#c1a97d"/>
    <rect x="248" y="48" width="26" height="18" fill="#b99f74"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Granaries need raised volume, sealed mass, and food-security identity.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">They should sit between domestic and military in visual weight.</text>
    <rect x="18" y="266" width="22" height="22" fill="#c1a97d"/>
    <rect x="46" y="266" width="22" height="22" fill="#8a6b40"/>
    <rect x="74" y="266" width="22" height="22" fill="#b99f74"/>
  </g>

  <g transform="translate(84 606)">
    <rect width="400" height="190" rx="14" fill="#ddd2c0"/>
    <circle cx="102" cy="98" r="44" fill="#a69177" stroke="#665845" stroke-width="4"/>
    <circle cx="102" cy="98" r="22" fill="#d8ccb8"/>
    <rect x="82" y="46" width="40" height="16" fill="#8c755b"/>
    <rect x="188" y="86" width="132" height="60" fill="#b39c7f" stroke="#705e48" stroke-width="4"/>
    <polygon points="180,86 252,40 326,86" fill="#83623d" stroke="#614824" stroke-width="4"/>
    <rect x="228" y="98" width="18" height="20" fill="#4b3e31"/>
    <rect x="256" y="98" width="18" height="20" fill="#4b3e31"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Water structures need one immediate circular draw-point read plus civic path wear.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Keep the yard readable as life-support infrastructure, not shrine space.</text>
    <rect x="18" y="266" width="22" height="22" fill="#a69177"/>
    <rect x="46" y="266" width="22" height="22" fill="#5c7b8c"/>
    <rect x="74" y="266" width="22" height="22" fill="#83623d"/>
  </g>

  <g transform="translate(600 606)">
    <rect width="400" height="190" rx="14" fill="#ddd2c0"/>
    <rect x="58" y="92" width="138" height="54" fill="#8f775f" stroke="#5e5041" stroke-width="4"/>
    <polygon points="48,92 126,46 204,92" fill="#6e5235" stroke="#523d27" stroke-width="4"/>
    <rect x="222" y="64" width="50" height="82" fill="#6f665d" stroke="#4f473f" stroke-width="4"/>
    <rect x="238" y="44" width="18" height="20" fill="#6f665d"/>
    <rect x="280" y="108" width="52" height="20" fill="#9b5b2e"/>
    <rect x="294" y="94" width="24" height="14" fill="#3f352d"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Forge identity comes from chimney, heat source, and tool yard, not fantasy sparks.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Keep the silhouette short and industrial for RTS use.</text>
    <rect x="18" y="266" width="22" height="22" fill="#6f665d"/>
    <rect x="46" y="266" width="22" height="22" fill="#9b5b2e"/>
    <rect x="74" y="266" width="22" height="22" fill="#3f352d"/>
  </g>

  <g transform="translate(1116 606)">
    <rect width="400" height="190" rx="14" fill="#ddd2c0"/>
    <rect x="40" y="120" width="244" height="26" fill="#9a8266"/>
    <circle cx="92" cy="150" r="18" fill="#7d6448"/>
    <circle cx="232" cy="150" r="18" fill="#7d6448"/>
    <rect x="70" y="86" width="102" height="34" fill="#b19a7c" stroke="#6f5d48" stroke-width="4"/>
    <rect x="188" y="92" width="58" height="28" fill="#8b714f" stroke="#5e4f40" stroke-width="4"/>
    <rect x="260" y="104" width="70" height="42" fill="#a68d71" stroke="#6d5c48" stroke-width="4"/>
    <rect x="292" y="88" width="16" height="16" fill="#a68d71"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Cart yards and civic logistics read through wheels, stacks, and broad open handling space.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">These should support economy readability without clutter spill.</text>
    <rect x="18" y="266" width="22" height="22" fill="#7d6448"/>
    <rect x="46" y="266" width="22" height="22" fill="#a68d71"/>
    <rect x="74" y="266" width="22" height="22" fill="#b19a7c"/>
  </g>

  <text x="64" y="996" fill="#6a5845" font-family="Arial, sans-serif" font-size="15">Use for economy and population-support prompting, construction-state planning, and later icon/prefab decomposition. These are first-pass family boards only and should remain staging assets until review tags move them forward.</text>
</svg>
