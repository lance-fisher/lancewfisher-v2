<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
  <rect width="1600" height="1040" fill="#ebe0cb"/>
  <rect x="28" y="28" width="1544" height="984" rx="24" fill="#f7f0e3" stroke="#372d22" stroke-width="3"/>
  <text x="64" y="84" fill="#2c241d" font-family="Georgia, serif" font-size="34">Bloodlines Civic Support Variants Sheet</text>
  <text x="64" y="116" fill="#6c5a48" font-family="Arial, sans-serif" font-size="18">Stage: first_pass_concept | Review: placeholder_only | Focus: market, storehouse, granary, well, forge, and civic logistics reads</text>

  <g font-family="Arial, sans-serif" font-size="16" fill="#47392c">
    <text x="92" y="170">Market Lane</text>
    <text x="612" y="170">Storehouse Lane</text>
    <text x="1128" y="170">Granary Lane</text>
    <text x="92" y="572">Well And Water Yard</text>
    <text x="612" y="572">Blacksmith / Forge</text>
    <text x="1128" y="572">Civic Cart Yard</text>
  </g>

  <g stroke="#b8a58d" stroke-width="2">
    <rect x="64" y="186" width="440" height="334" rx="18" fill="#fcf7ef"/>
    <rect x="580" y="186" width="440" height="334" rx="18" fill="#fcf7ef"/>
