  <text x="64" y="116" fill="#6c5a48" font-family="Arial, sans-serif" font-size="18">Stage: first_pass_concept | Review: placeholder_only | Focus: trade-facing building families that remain clear at gameplay height through frontage, route logic, and cargo staging</text>

