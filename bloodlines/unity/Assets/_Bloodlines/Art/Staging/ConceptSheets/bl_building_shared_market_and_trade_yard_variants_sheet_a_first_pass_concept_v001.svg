    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="13">Route markets read through stall rhythm and broad frontage rather than roof complexity.</text>
    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">Keep the trade face open and countable. No clutter walls.</text>
    <rect x="18" y="266" width="22" height="22" fill="#b78443"/>
    <rect x="46" y="266" width="22" height="22" fill="#305e86"/>
    <rect x="74" y="266" width="22" height="22" fill="#8f5c3f"/>
  </g>

