    <text x="18" y="244" fill="#695544" font-family="Arial, sans-serif" font-size="11">Signal a commercial hub through hall width, signage, and route-facing entry.</text>
    <rect x="18" y="266" width="22" height="22" fill="#bf9b4f"/>
    <rect x="46" y="266" width="22" height="22" fill="#c6b191"/>
    <rect x="74" y="266" width="22" height="22" fill="#6e5847"/>
  </g>

