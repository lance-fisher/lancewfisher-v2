    <path d="M0 162 L64 156 L136 164 L220 158 L302 166 L400 160 L400 190 L0 190 Z" fill="#8f7757"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Village wells must read instantly from their circular draw point and surrounding footpath wear.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Keep them broad and civic, not decorative fountain pieces.</text>
    <rect x="18" y="266" width="22" height="22" fill="#6a5f52"/>
    <rect x="46" y="266" width="22" height="22" fill="#5c7b8c"/>
    <rect x="74" y="266" width="22" height="22" fill="#745a38"/>
  </g>

  <g transform="translate(600 204)">
    <rect width="400" height="190" rx="14" fill="#ddd2c0"/>
    <rect x="116" y="84" width="136" height="62" fill="#a28b6f" stroke="#675845" stroke-width="4"/>
    <polygon points="106,84 184,34 262,84" fill="#86633d" stroke="#644923" stroke-width="4"/>
    <rect x="170" y="100" width="26" height="46" fill="#5c7b8c"/>
    <path d="M0 162 L64 156 L146 164 L224 158 L304 166 L400 160 L400 190 L0 190 Z" fill="#8f7757"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Covered cisterns should feel protected and infrastructural, not like minor temples.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Roof mass and protected basin read matter more than ornament.</text>
    <rect x="18" y="266" width="22" height="22" fill="#a28b6f"/>
    <rect x="46" y="266" width="22" height="22" fill="#86633d"/>
    <rect x="74" y="266" width="22" height="22" fill="#5c7b8c"/>
  </g>

