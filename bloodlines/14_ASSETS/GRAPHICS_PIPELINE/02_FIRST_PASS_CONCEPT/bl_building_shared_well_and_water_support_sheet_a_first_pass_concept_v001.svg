    <rect x="78" y="114" width="206" height="24" fill="#9f886c" stroke="#655544" stroke-width="4"/>
    <rect x="108" y="104" width="30" height="40" fill="#7c6751" stroke="#56483c" stroke-width="4"/>
    <rect x="224" y="104" width="30" height="40" fill="#7c6751" stroke="#56483c" stroke-width="4"/>
    <rect x="138" y="118" width="86" height="14" fill="#5c7b8c"/>
