    <rect x="36" y="102" width="90" height="44" fill="#8f7759" stroke="#5d4f40" stroke-width="4"/>
    <rect x="138" y="72" width="50" height="74" fill="#9d866a" stroke="#645544" stroke-width="4"/>
    <rect x="200" y="58" width="140" height="18" fill="#9d866a" stroke="#655544" stroke-width="4"/>
    <path d="M0 162 L70 156 L144 164 L224 158 L316 166 L400 160 L400 190 L0 190 Z" fill="#8f7757"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Aqueduct intakes need a strong water-source read and structural support logic.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Keep them broad, engineered, and grounded.</text>
    <rect x="18" y="266" width="22" height="22" fill="#9d866a"/>
    <rect x="46" y="266" width="22" height="22" fill="#5c7b8c"/>
    <rect x="74" y="266" width="22" height="22" fill="#8f7759"/>
  </g>

  <g transform="translate(600 606)">
    <rect width="400" height="190" rx="14" fill="#ddd2c0"/>
    <rect x="152" y="36" width="74" height="110" fill="#8b745b" stroke="#5c4f40" stroke-width="4"/>
    <rect x="164" y="52" width="50" height="36" fill="#5c7b8c"/>
