    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Reservoir towers should read as elevated reserve and distribution, not military towers.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">The water mass and civic frame need to stay obvious.</text>
