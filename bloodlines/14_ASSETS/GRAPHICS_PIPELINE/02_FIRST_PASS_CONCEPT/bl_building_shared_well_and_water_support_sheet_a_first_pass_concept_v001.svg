    <rect x="46" y="266" width="22" height="22" fill="#5c7b8c"/>
    <rect x="74" y="266" width="22" height="22" fill="#765836"/>
  </g>

  <g transform="translate(1116 606)">
    <rect width="400" height="190" rx="14" fill="#ddd2c0"/>
    <rect x="102" y="112" width="188" height="22" fill="#b19a7b" stroke="#6e5d48" stroke-width="4"/>
    <ellipse cx="196" cy="122" rx="44" ry="14" fill="#5c7b8c"/>
    <line x1="196" y1="56" x2="196" y2="108" stroke="#6f5737" stroke-width="6"/>
    <rect x="182" y="50" width="28" height="16" fill="#bf9b4f"/>
    <path d="M0 162 L72 156 L154 164 L236 158 L322 166 L400 160 L400 190 L0 190 Z" fill="#8f7757"/>
    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Civic basins are public order and water-presence reads, not ornamental plaza clutter.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Keep the basin shape broad enough to survive gameplay height.</text>
    <rect x="18" y="266" width="22" height="22" fill="#b19a7b"/>
    <rect x="46" y="266" width="22" height="22" fill="#5c7b8c"/>
    <rect x="74" y="266" width="22" height="22" fill="#bf9b4f"/>
  </g>

  <text x="64" y="996" fill="#6a5845" font-family="Arial, sans-serif" font-size="15">Use for water-support prompting, civic-support family cohesion, and settlement-readability planning. Water structures should feel indispensable and infrastructural without drifting into decorative fantasy fountains or overly magical faith reads.</text>
</svg>
