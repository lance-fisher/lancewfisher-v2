    <text x="18" y="222" fill="#3f3328" font-family="Arial, sans-serif" font-size="15">Trough courts are shared support nodes and should read as utility at a glance.</text>
    <text x="18" y="246" fill="#695544" font-family="Arial, sans-serif" font-size="13">Good for worker, livestock, and civic-footfall zones.</text>
