<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
  <rect width="1600" height="1040" fill="#ece0cb"/>
  <rect x="28" y="28" width="1544" height="984" rx="24" fill="#f7f0e3" stroke="#372d22" stroke-width="3"/>
  <text x="64" y="84" fill="#2c241d" font-family="Georgia, serif" font-size="34">Bloodlines Covenant Site Progression Sheet</text>
  <text x="64" y="116" fill="#6c5a48" font-family="Arial, sans-serif" font-size="18">Stage: first_pass_concept | Review: placeholder_only | Focus: wayshrine to apex progression with restrained covenant accents</text>

  <g font-family="Arial, sans-serif" font-size="16" fill="#47392c">
    <text x="92" y="170">Wayshrine</text>
    <text x="462" y="170">Covenant Hall</text>
    <text x="832" y="170">Grand Sanctuary</text>
    <text x="1202" y="170">Apex Covenant</text>
  </g>

  <g stroke="#b8a58d" stroke-width="2">
    <rect x="64" y="186" width="300" height="426" rx="18" fill="#fcf7ef"/>
    <rect x="434" y="186" width="300" height="426" rx="18" fill="#fcf7ef"/>
    <rect x="804" y="186" width="300" height="426" rx="18" fill="#fcf7ef"/>
    <rect x="1174" y="186" width="300" height="426" rx="18" fill="#fcf7ef"/>
    <rect x="64" y="640" width="1410" height="282" rx="18" fill="#fcf7ef"/>
  </g>

  <g transform="translate(86 210)">
    <rect width="256" height="180" rx="14" fill="#ddd2c0"/>
    <rect x="108" y="108" width="40" height="40" fill="#9f886d" stroke="#655644" stroke-width="4"/>
    <line x1="128" y1="62" x2="128" y2="108" stroke="#6f5737" stroke-width="8"/>
    <circle cx="128" cy="54" r="18" fill="#c4b381" stroke="#7d6a45" stroke-width="4"/>
    <text x="16" y="214" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Earliest covenant presence should stay compact and unmistakable.</text>
    <text x="16" y="238" fill="#695544" font-family="Arial, sans-serif" font-size="12">One strong sacred marker is enough.</text>
  </g>

  <g transform="translate(456 210)">
    <rect width="256" height="180" rx="14" fill="#ddd2c0"/>
    <rect x="78" y="92" width="100" height="56" fill="#ad9679" stroke="#6a5946" stroke-width="4"/>
    <polygon points="66,92 128,48 190,92" fill="#86633d" stroke="#634823" stroke-width="4"/>
    <line x1="128" y1="42" x2="128" y2="92" stroke="#6e5636" stroke-width="6"/>
    <text x="16" y="214" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Mid-tier sites gain assembly mass and clearer processional authority.</text>
    <text x="16" y="238" fill="#695544" font-family="Arial, sans-serif" font-size="12">Still grounded, still civic-adjacent.</text>
  </g>

  <g transform="translate(826 210)">
    <rect width="256" height="180" rx="14" fill="#ddd2c0"/>
    <rect x="62" y="82" width="132" height="66" fill="#bea587" stroke="#735f49" stroke-width="4"/>
    <polygon points="52,82 128,34 204,82" fill="#8f6a41" stroke="#654923" stroke-width="4"/>
    <rect x="112" y="46" width="32" height="36" fill="#c4b381" stroke="#7d6a45" stroke-width="4"/>
    <text x="16" y="214" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Grand sanctuaries read as regional sacred authority and late-game weight.</text>
    <text x="16" y="238" fill="#695544" font-family="Arial, sans-serif" font-size="12">Avoid fantasy-cathedral excess.</text>
  </g>

  <g transform="translate(1196 210)">
    <rect width="256" height="180" rx="14" fill="#ddd2c0"/>
    <rect x="50" y="78" width="156" height="70" fill="#b29a7d" stroke="#6e5b48" stroke-width="4"/>
    <polygon points="42,78 128,24 214,78" fill="#85623c" stroke="#624722" stroke-width="4"/>
    <line x1="128" y1="20" x2="128" y2="78" stroke="#6e5636" stroke-width="8"/>
    <circle cx="128" cy="16" r="14" fill="#c4b381" stroke="#7d6a45" stroke-width="4"/>
    <text x="16" y="214" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Apex sites carry spiritual culmination and should feel final without glowing spectacle.</text>
    <text x="16" y="238" fill="#695544" font-family="Arial, sans-serif" font-size="12">Weight, processional logic, and elevation do the work.</text>
  </g>

  <g transform="translate(90 674)" font-family="Arial, sans-serif">
    <text x="0" y="22" fill="#322923" font-size="22">Covenant Accent Discipline</text>
    <text x="0" y="56" fill="#5e4d40" font-size="16">Old Light: lantern, halo ring, measured radiance. Keep it infrastructural and solemn.</text>
    <text x="0" y="86" fill="#5e4d40" font-size="16">Blood Dominion: sacrificial weight, darker cloth, iron ritual tools. No demonic fantasy drift.</text>
    <text x="0" y="116" fill="#5e4d40" font-size="16">Order: geometric framing, disciplined thresholds, precise rhythm. No sci-fi purity reads.</text>
    <text x="0" y="146" fill="#5e4d40" font-size="16">Wild: living-wood and stone integration, shrines tied to ground and growth. No druid-cottage caricature.</text>

    <text x="0" y="202" fill="#322923" font-size="22">Progression Rules</text>
    <text x="0" y="236" fill="#5e4d40" font-size="16">1. Every tier must still read as a sacred structure from gameplay height.</text>
    <text x="0" y="266" fill="#5e4d40" font-size="16">2. Bigger tier means stronger silhouette authority, not just more decoration.</text>
    <text x="0" y="296" fill="#5e4d40" font-size="16">3. Sacred identity may intensify, but cannot break the grounded Bloodlines material lane.</text>

    <text x="720" y="22" fill="#322923" font-size="22">Use In Later Follow-Ups</text>
    <text x="720" y="56" fill="#5e4d40" font-size="16">- covenant-specific variant sheets after review</text>
    <text x="720" y="86" fill="#5e4d40" font-size="16">- faith icon refinement paired to actual structure forms</text>
    <text x="720" y="116" fill="#5e4d40" font-size="16">- construction, damage, and occupied variants once structure families settle</text>
    <text x="720" y="146" fill="#5e4d40" font-size="16">- Unity testbed comparisons against keeps, markets, and civic-support structures</text>
  </g>

  <text x="64" y="996" fill="#6a5845" font-family="Arial, sans-serif" font-size="15">Use for faith-building progression prompts and review. This sheet defines sacred escalation through mass, elevation, and procession rather than bright magic or fantastical cathedral excess.</text>
</svg>
