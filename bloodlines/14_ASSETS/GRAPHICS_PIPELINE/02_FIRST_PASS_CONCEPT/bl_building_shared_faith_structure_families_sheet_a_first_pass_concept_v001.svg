<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
  <rect width="1600" height="1040" fill="#e9ddc8"/>
  <rect x="28" y="28" width="1544" height="984" rx="24" fill="#f7f0e3" stroke="#372d22" stroke-width="3"/>
  <text x="64" y="84" fill="#2c241d" font-family="Georgia, serif" font-size="34">Bloodlines Faith Structure Families Sheet</text>
  <text x="64" y="116" fill="#6c5a48" font-family="Arial, sans-serif" font-size="18">Stage: first_pass_concept | Review: placeholder_only | Focus: grounded covenant structures for Old Light, Blood Dominion, Order, and Wild lanes</text>

  <g stroke="#b8a58d" stroke-width="2">
    <rect x="64" y="186" width="340" height="334" rx="18" fill="#fcf7ef"/>
    <rect x="438" y="186" width="340" height="334" rx="18" fill="#fcf7ef"/>
    <rect x="812" y="186" width="340" height="334" rx="18" fill="#fcf7ef"/>
    <rect x="1186" y="186" width="340" height="334" rx="18" fill="#fcf7ef"/>
    <rect x="64" y="556" width="1462" height="366" rx="18" fill="#fcf7ef"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="18" fill="#3b3026">
    <text x="90" y="224">Old Light Pyre House</text>
    <text x="464" y="224">Blood Dominion Altar Hall</text>
    <text x="838" y="224">Order Edict House</text>
    <text x="1212" y="224">Wild Root Shrine</text>
  </g>

  <g transform="translate(90 246)">
    <rect width="288" height="168" rx="14" fill="#e4dacb"/>
    <rect x="96" y="74" width="96" height="64" fill="#c3ae8b" stroke="#7e684c" stroke-width="4"/>
    <polygon points="86,74 144,30 204,74" fill="#8a6b40" stroke="#644924" stroke-width="4"/>
    <rect x="134" y="28" width="20" height="46" fill="#8a6b40"/>
    <rect x="42" y="118" width="40" height="20" fill="#8f785e"/>
    <rect x="206" y="118" width="40" height="20" fill="#8f785e"/>
    <line x1="144" y1="62" x2="144" y2="16" stroke="#e0b65a" stroke-width="6"/>
    <circle cx="144" cy="8" r="8" fill="#f0cd6e"/>
    <text x="16" y="198" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Pyre, ash hearth, and processional front.</text>
    <text x="16" y="220" fill="#695544" font-family="Arial, sans-serif" font-size="12">Bright, but still civic and built.</text>
  </g>

  <g transform="translate(464 246)">
    <rect width="288" height="168" rx="14" fill="#e4dacb"/>
    <rect x="86" y="74" width="116" height="64" fill="#826454" stroke="#5a4337" stroke-width="4"/>
    <polygon points="78,74 144,30 210,74" fill="#5b4538" stroke="#3d2d24" stroke-width="4"/>
    <rect x="138" y="48" width="20" height="90" fill="#563d32"/>
    <rect x="118" y="138" width="60" height="10" fill="#6f3b31"/>
    <circle cx="144" cy="100" r="12" fill="#8b2f26"/>
    <rect x="48" y="118" width="28" height="20" fill="#7f5d4f"/>
    <rect x="212" y="118" width="28" height="20" fill="#7f5d4f"/>
    <text x="16" y="198" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Weighty altar mass and disciplined ritual center.</text>
    <text x="16" y="220" fill="#695544" font-family="Arial, sans-serif" font-size="12">Avoid occult fantasy drift.</text>
  </g>

  <g transform="translate(838 246)">
    <rect width="288" height="168" rx="14" fill="#e4dacb"/>
    <rect x="94" y="68" width="100" height="70" fill="#b4a28e" stroke="#70604f" stroke-width="4"/>
    <polygon points="84,68 144,26 204,68" fill="#8e7a63" stroke="#695949" stroke-width="4"/>
    <rect x="128" y="24" width="32" height="24" fill="#b8a37b" stroke="#7d6848" stroke-width="3"/>
    <line x1="144" y1="48" x2="144" y2="132" stroke="#6a5a46" stroke-width="6"/>
    <line x1="122" y1="82" x2="166" y2="82" stroke="#6a5a46" stroke-width="6"/>
    <rect x="44" y="116" width="32" height="22" fill="#8c7a65"/>
    <rect x="212" y="116" width="32" height="22" fill="#8c7a65"/>
    <text x="16" y="198" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Order reads through law-house geometry and sign discipline.</text>
    <text x="16" y="220" fill="#695544" font-family="Arial, sans-serif" font-size="12">Use authority, not magical spectacle.</text>
  </g>

  <g transform="translate(1212 246)">
    <rect width="288" height="168" rx="14" fill="#e4dacb"/>
    <rect x="84" y="78" width="120" height="60" fill="#90765a" stroke="#5f4d39" stroke-width="4"/>
    <polygon points="76,78 144,34 212,78" fill="#6d5536" stroke="#513e28" stroke-width="4"/>
    <path d="M72 84 C96 58 118 52 132 80" fill="none" stroke="#5e6d3f" stroke-width="8" stroke-linecap="round"/>
    <path d="M214 84 C194 58 170 52 156 80" fill="none" stroke="#5e6d3f" stroke-width="8" stroke-linecap="round"/>
    <path d="M144 30 C144 10 132 6 124 14" fill="none" stroke="#5e6d3f" stroke-width="8" stroke-linecap="round"/>
    <rect x="52" y="118" width="26" height="20" fill="#708354"/>
    <rect x="210" y="118" width="26" height="20" fill="#708354"/>
    <text x="16" y="198" fill="#3f3328" font-family="Arial, sans-serif" font-size="14">Wild structures integrate roots and shelter, not glowing druid fantasy.</text>
    <text x="16" y="220" fill="#695544" font-family="Arial, sans-serif" font-size="12">Natural attachment stays built and functional.</text>
  </g>

  <g transform="translate(88 582)" font-family="Arial, sans-serif">
    <text x="0" y="24" fill="#322923" font-size="22">Shared Faith Rules</text>
    <text x="0" y="60" fill="#5e4d40" font-size="16">1. Each covenant needs a distinct ritual silhouette, but still obeys grounded construction and settlement logic.</text>
    <text x="0" y="90" fill="#5e4d40" font-size="16">2. Shrine, hall, sanctuary, and apex tiers should gain authority through scale and processional mass, not particle clutter.</text>
    <text x="0" y="120" fill="#5e4d40" font-size="16">3. Faith structures should be visible on the battlefield without becoming brighter than units, keeps, or core roads.</text>

    <text x="0" y="176" fill="#322923" font-size="22">Tier Direction</text>
    <text x="0" y="212" fill="#5e4d40" font-size="16">- Shrine: small footprint, one unmistakable sacred marker, local gathering feel.</text>
    <text x="0" y="242" fill="#5e4d40" font-size="16">- Hall: formal entry, stronger roofline, controlled public ceremony space.</text>
    <text x="0" y="272" fill="#5e4d40" font-size="16">- Grand sanctuary: larger civic-religious weight, visible approach, stronger skyline marker.</text>
    <text x="0" y="302" fill="#5e4d40" font-size="16">- Apex: highest authority tier, but still readable as architecture rather than mystical VFX.</text>

    <text x="0" y="358" fill="#322923" font-size="22">Avoid</text>
    <text x="0" y="394" fill="#5e4d40" font-size="16">- cathedral spectacle detached from RTS play height</text>
    <text x="0" y="424" fill="#5e4d40" font-size="16">- glowing magic noise or fantasy crystals</text>
    <text x="0" y="454" fill="#5e4d40" font-size="16">- covenant silhouettes so similar that faith lanes collapse together in a crowded settlement</text>
  </g>

  <text x="64" y="996" fill="#6a5845" font-family="Arial, sans-serif" font-size="15">Use with: faith manifest, House identity overlays, and review tags for style drift, structure-purpose confusion, and gameplay-height sacred-marker control. These are family studies, not approved final covenant architecture.</text>
</svg>
