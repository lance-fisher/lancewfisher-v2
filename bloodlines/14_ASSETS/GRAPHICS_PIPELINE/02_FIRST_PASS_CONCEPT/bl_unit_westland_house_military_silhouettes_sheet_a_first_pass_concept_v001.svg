<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
  <rect width="1600" height="1040" fill="#e6d7c8"/>
  <rect x="28" y="28" width="1544" height="984" rx="24" fill="#f4ece2" stroke="#2c251f" stroke-width="3"/>
  <text x="64" y="84" fill="#241f1b" font-family="Georgia, serif" font-size="34">Bloodlines House Westland Military Silhouettes</text>
  <text x="64" y="116" fill="#69584a" font-family="Arial, sans-serif" font-size="18">Stage: first_pass_concept | Review: placeholder_only | Scope: house treatment study, not a roster rewrite</text>

  <g transform="translate(1160 58)">
    <rect width="344" height="112" rx="16" fill="#eddccd" stroke="#9b7c65" stroke-width="2"/>
    <text x="18" y="28" fill="#392f28" font-family="Arial, sans-serif" font-size="16">Palette / Material Read</text>
    <rect x="18" y="42" width="26" height="26" rx="6" fill="#922a22"/>
    <rect x="52" y="42" width="26" height="26" rx="6" fill="#df7143"/>
    <rect x="86" y="42" width="26" height="26" rx="6" fill="#6e5440"/>
    <rect x="120" y="42" width="26" height="26" rx="6" fill="#6f747a"/>
    <text x="18" y="92" fill="#5f4d40" font-family="Arial, sans-serif" font-size="13">Frontier red, ember-orange accent, travel leather, weathered steel. Forward lean before fortress mass.</text>
  </g>

  <g stroke="#b59f88" stroke-width="2">
    <rect x="64" y="190" width="340" height="322" rx="20" fill="#faf3ea"/>
    <rect x="438" y="190" width="340" height="322" rx="20" fill="#faf3ea"/>
    <rect x="812" y="190" width="340" height="322" rx="20" fill="#faf3ea"/>
    <rect x="1186" y="190" width="340" height="322" rx="20" fill="#faf3ea"/>
    <rect x="64" y="548" width="1462" height="404" rx="20" fill="#faf3ea"/>
  </g>

  <g font-family="Arial, sans-serif">
    <text x="90" y="228" fill="#352c26" font-size="18">Frontier line levy</text>
    <text x="464" y="228" fill="#352c26" font-size="18">Spear rider lane</text>
    <text x="838" y="228" fill="#352c26" font-size="18">Skirmish support lane</text>
    <text x="1212" y="228" fill="#352c26" font-size="18">Trail command lane</text>
  </g>

  <g transform="translate(98 252)">
    <rect width="272" height="176" rx="14" fill="#e4d6c8"/>
    <circle cx="56" cy="40" r="17" fill="#2a211b"/>
    <rect x="42" y="56" width="24" height="66" rx="10" fill="#922a22"/>
    <rect x="30" y="70" width="14" height="44" rx="7" fill="#c05532"/>
    <rect x="66" y="70" width="16" height="44" rx="7" fill="#c05532"/>
    <rect x="46" y="120" width="8" height="32" rx="4" fill="#29221d"/>
    <rect x="57" y="120" width="8" height="32" rx="4" fill="#29221d"/>
    <line x1="96" y1="62" x2="120" y2="126" stroke="#72553d" stroke-width="8"/>
    <text x="188" y="60" fill="#352d28" font-size="15">Travel-worn but aggressive,</text>
    <text x="188" y="84" fill="#645243" font-size="13">with lighter kit and more</text>
    <text x="188" y="108" fill="#645243" font-size="13">forward posture than keep lines.</text>
  </g>

  <g transform="translate(472 252)">
    <rect width="272" height="176" rx="14" fill="#e4d6c8"/>
    <circle cx="54" cy="38" r="16" fill="#2a221b"/>
    <rect x="6" y="96" width="86" height="24" rx="12" fill="#6e5440"/>
    <circle cx="24" cy="120" r="14" fill="#5c4735"/>
    <circle cx="74" cy="120" r="14" fill="#5c4735"/>
    <rect x="44" y="48" width="18" height="62" rx="8" fill="#922a22"/>
    <line x1="62" y1="46" x2="120" y2="104" stroke="#72553d" stroke-width="8"/>
    <text x="170" y="60" fill="#352d28" font-size="15">Rider silhouette should read</text>
    <text x="170" y="84" fill="#645243" font-size="13">fast, restless, and frontier,</text>
    <text x="170" y="108" fill="#645243" font-size="13">not knightly or ceremonial.</text>
  </g>

  <g transform="translate(846 252)">
    <rect width="272" height="176" rx="14" fill="#e4d6c8"/>
    <circle cx="54" cy="40" r="16" fill="#30271f"/>
    <rect x="44" y="56" width="22" height="64" rx="9" fill="#922a22"/>
    <rect x="48" y="120" width="7" height="28" rx="4" fill="#29221d"/>
    <rect x="57" y="120" width="7" height="28" rx="4" fill="#29221d"/>
    <path d="M112 38 Q82 90 112 144" fill="none" stroke="#72553d" stroke-width="8"/>
    <line x1="112" y1="38" x2="112" y2="144" stroke="#b5b9bd" stroke-width="2"/>
    <text x="182" y="60" fill="#352d28" font-size="15">Support silhouettes should feel</text>
    <text x="182" y="84" fill="#645243" font-size="13">mobile and opportunistic, not</text>
    <text x="182" y="108" fill="#645243" font-size="13">heavy wall-defense archers.</text>
  </g>

  <g transform="translate(1220 252)">
    <rect width="272" height="176" rx="14" fill="#e4d6c8"/>
    <circle cx="56" cy="38" r="17" fill="#2a221b"/>
    <rect x="44" y="54" width="26" height="68" rx="10" fill="#922a22"/>
    <rect x="47" y="122" width="8" height="30" rx="4" fill="#29221d"/>
    <rect x="57" y="122" width="8" height="30" rx="4" fill="#29221d"/>
    <rect x="106" y="42" width="8" height="100" rx="4" fill="#72553d"/>
    <polygon points="114,42 154,54 114,68" fill="#df7143"/>
    <text x="182" y="60" fill="#352d28" font-size="15">Command reads as pathfinder</text>
    <text x="182" y="84" fill="#645243" font-size="13">authority and quick pressure, not</text>
    <text x="182" y="108" fill="#645243" font-size="13">stone-seat administration.</text>
  </g>

  <g transform="translate(88 574)" font-family="Arial, sans-serif">
    <text x="0" y="24" fill="#322922" font-size="22">House Read Rules</text>
    <text x="0" y="62" fill="#5e4d40" font-size="16">1. Westland should read as frontier aggression: lighter travel gear, faster silhouettes, and visible path-hardening rather than fortress comfort.</text>
    <text x="0" y="92" fill="#5e4d40" font-size="16">2. Red and orange should signal momentum and harsh field use, not carnival saturation or bandit caricature.</text>
    <text x="0" y="122" fill="#5e4d40" font-size="16">3. Rider and skirmish lanes must feel honestly mobile, with less planted mass than Stonehelm or Ironmark.</text>

    <text x="0" y="178" fill="#322922" font-size="22">What To Avoid</text>
    <text x="0" y="216" fill="#5e4d40" font-size="16">- Do not drift into outlaw fantasy, barbarian tropes, or post-apocalyptic rag logic.</text>
    <text x="0" y="246" fill="#5e4d40" font-size="16">- Do not confuse Westland with Hartvale's warmer civic defense or Ironmark's forge-heavy density.</text>
    <text x="0" y="276" fill="#5e4d40" font-size="16">- Do not make the lane so light that it loses medieval plausibility at RTS scale.</text>

    <text x="0" y="332" fill="#322922" font-size="22">Use In Review</text>
    <text x="0" y="370" fill="#5e4d40" font-size="16">This sheet is a silhouette and material-direction board for future prompting, 3D blockout, icon treatment, and approved staging review.</text>
    <text x="0" y="400" fill="#5e4d40" font-size="16">It does not declare new canon units beyond the settled Westland visual treatment lane.</text>
  </g>

  <text x="64" y="992" fill="#6a5848" font-family="Arial, sans-serif" font-size="15">House-specific silhouette board for governed graphics-lane review. Keep additive to canon and stage only through approved Unity staging surfaces.</text>
</svg>
