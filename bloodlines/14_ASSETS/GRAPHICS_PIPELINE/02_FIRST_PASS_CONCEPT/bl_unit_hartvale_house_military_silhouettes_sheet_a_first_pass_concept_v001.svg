    <text x="90" y="228" fill="#4b3625" font-size="18">Field levy lane</text>
    <text x="464" y="228" fill="#4b3625" font-size="18">Verdant Warden lane</text>
    <text x="838" y="228" fill="#4b3625" font-size="18">Harvest bow lane</text>
    <text x="1212" y="228" fill="#4b3625" font-size="18">Steward command lane</text>
  </g>

  <g transform="translate(94 252)">
    <rect width="280" height="176" rx="14" fill="#ebdcc8"/>
    <circle cx="56" cy="42" r="18" fill="#6f4728"/>
